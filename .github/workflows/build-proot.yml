name: Build Static Proot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64, riscv64]

    steps:
      - uses: actions/checkout@v4
        with:
          repository: proot-me/proot
          ref: v5.4.0
          submodules: recursive

      - name: Install deps
        run: sudo apt-get install -y build-essential libtalloc-dev

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Build proot for ${{ matrix.arch }}
        run: |
          cd src
          TARGET="${{ matrix.arch }}-linux-musl"
          make STATIC=1 CC="zig cc -target $TARGET"
          mv proot ../proot-${{ matrix.arch }}-static
          chmod +x ../proot-${{ matrix.arch }}-static

      - name: Show info
        run: |
          file proot-${{ matrix.arch }}-static
          echo "=== Is static? ==="
          ldd proot-${{ matrix.arch }}-static 2>&1 | grep -q "not a dynamic" && echo "✅ STATIC" || echo "Dynamic"

      - uses: actions/upload-artifact@v4
        with:
          name: proot-${{ matrix.arch }}-static
          path: proot-${{ matrix.arch }}-static
