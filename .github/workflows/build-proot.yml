name: Build Static Proot

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            zig_target: x86_64-linux-musl
          - arch: aarch64
            zig_target: aarch64-linux-musl

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          repository: proot-me/proot
          submodules: recursive  # ✅ FIX: Récupère uthash, cli, etc.

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtalloc-dev

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.11.0  # Version stable recommandée

      - name: Build static proot
        run: |
          # Zig agit comme CC. On force le target musl pour le statique.
          make STATIC=1 CC="zig cc -target ${{ matrix.zig_target }}"
          mv src/proot proot-${{ matrix.arch }}-static
          chmod +x proot-${{ matrix.arch }}-static
          file proot-${{ matrix.arch }}-static
          ldd proot-${{ matrix.arch }}-static || echo "✅ Binary is static"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-${{ matrix.arch }}-static
          path: proot-${{ matrix.arch }}-static
          retention-days: 90
