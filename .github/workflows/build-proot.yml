name: Build Static Proot

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtalloc-dev git wget
          # Installer musl pour la compilation statique
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            sudo apt-get install -y musl-tools
          else
            # Pour aarch64, on utilise un cross-compiler musl
            wget https://musl.cc/aarch64-linux-musl-cross.tgz
            tar xf aarch64-linux-musl-cross.tgz
            echo "$(pwd)/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH
          fi

      - name: Clone Proot source
        run: |
          git clone https://github.com/proot-me/proot.git proot-src
          cd proot-src
          # On prend la branche master pour avoir les dernières features (potentiellement -H)
          git checkout master

      - name: Build static proot
        run: |
          cd proot-src
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            make STATIC=1 CC=musl-gcc
            mv src/proot ../proot-x86_64-static
          else
            make STATIC=1 CC=aarch64-linux-musl-gcc
            mv src/proot ../proot-aarch64-static
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-${{ matrix.arch }}-static
          path: proot-${{ matrix.arch }}-static
          retention-days: 90
